spring:
  application:
    name: marketplace-app
  cache:
    type: redis
  data:
    redis:
      host: redis
      port: 6379

  datasource:
    url: jdbc:postgresql://postgres:5432/marketplace
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: true

server:
  port: 8080

management:
  endpoints:
    health:
      probes:
        enabled: true
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  health:
    db:
      enabled: true
    diskspace:
      enabled: true

  info:
    env:
      enabled: true

  prometheus:
    enabled: true
    metrics:
      tags:
        application: ${spring.application.name}

  tracing:
    enabled: true
    sampling:
      probability: 1.0

  otlp:
    tracing:
      endpoint: http://tempo:4318/v1/traces

  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true

  logging:
    pattern:
      level: "%5p [${spring.application.name:},traceId=%X{traceId},spanId=%X{spanId}]"

